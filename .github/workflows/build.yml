name: Node.js CI

on: [push]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

  lint:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun lint

  publish:
    needs: [build, lint]
    runs-on: ubuntu-latest

    # Run on any tag
    # A v* tag is only ever created by `bun run release:*`, which always bumps
    # the version first — so every tag is a new version and is safe to publish.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: bun install
      - run: bun run build
      - run: npm publish --access public # authenticates via OIDC (id-token: write)
